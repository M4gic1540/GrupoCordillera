services:
  postgres-events:
    image: postgres:15
    container_name: dataingestion-postgres
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: ${EVENTS_DB_NAME:-events_db}
      POSTGRES_USER: ${EVENTS_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${EVENTS_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_events_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVENTS_DB_USERNAME:-postgres} -d ${EVENTS_DB_NAME:-events_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 200m
    cpus: 0.15

  postgres-kpi:
    image: postgres:15
    container_name: kpiengine-postgres
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: ${KPI_DB_NAME:-kpi_db}
      POSTGRES_USER: ${KPI_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${KPI_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_kpi_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KPI_DB_USERNAME:-postgres} -d ${KPI_DB_NAME:-kpi_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 200m
    cpus: 0.15

  postgres:
    image: postgres:15
    container_name: authservice-postgres
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-authservice_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-authservice_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 200m
    cpus: 0.15

  authservice-1:
    build:
      context: ./authservice
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-authservice_db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN}
    expose:
      - "8080"
    volumes:
      - ./Logs:/app/Logs
    mem_limit: 300m
    cpus: 0.25

  authservice-2:
    build:
      context: ./authservice
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-authservice_db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN}
    expose:
      - "8080"
    volumes:
      - ./Logs:/app/Logs
    mem_limit: 300m
    cpus: 0.25

  data-ingestion-service-1:
    build:
      context: ./data-ingestion-service
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      postgres-events:
        condition: service_healthy
      kpi-engine:
        condition: service_started
    environment:
      EVENTS_DB_URL: jdbc:postgresql://postgres-events:5432/${EVENTS_DB_NAME:-events_db}
      EVENTS_DB_USERNAME: ${EVENTS_DB_USERNAME:-postgres}
      EVENTS_DB_PASSWORD: ${EVENTS_DB_PASSWORD}
      KPI_ENGINE_BASE_URL: ${KPI_ENGINE_BASE_URL:-http://kpi-engine:8082}
    expose:
      - "8081"
    mem_limit: 200m
    cpus: 0.15

  data-ingestion-service-2:
    build:
      context: ./data-ingestion-service
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      postgres-events:
        condition: service_healthy
      kpi-engine:
        condition: service_started
    environment:
      EVENTS_DB_URL: jdbc:postgresql://postgres-events:5432/${EVENTS_DB_NAME:-events_db}
      EVENTS_DB_USERNAME: ${EVENTS_DB_USERNAME:-postgres}
      EVENTS_DB_PASSWORD: ${EVENTS_DB_PASSWORD}
      KPI_ENGINE_BASE_URL: ${KPI_ENGINE_BASE_URL:-http://kpi-engine:8082}
    expose:
      - "8081"
    mem_limit: 200m
    cpus: 0.15

  kpi-engine:
    build:
      context: ./kpi-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      postgres-kpi:
        condition: service_healthy
    environment:
      KPI_DB_URL: jdbc:postgresql://postgres-kpi:5432/${KPI_DB_NAME:-kpi_db}
      KPI_DB_USERNAME: ${KPI_DB_USERNAME:-postgres}
      KPI_DB_PASSWORD: ${KPI_DB_PASSWORD}
    expose:
      - "8082"
    ports:
      - "8082:8082"
      
    mem_limit: 200m
    cpus: 0.15

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: authservice-spring-gateway
    restart: unless-stopped
    init: true
    depends_on:
      - authservice-1
      - authservice-2
      - data-ingestion-service-1
      - data-ingestion-service-2
      - kpi-engine
    environment:
      AUTHSERVICE_1_URL: http://authservice-1:8080
      AUTHSERVICE_2_URL: http://authservice-2:8080
      INGESTION_1_URL: http://data-ingestion-service-1:8081
      INGESTION_2_URL: http://data-ingestion-service-2:8081
      KPI_ENGINE_URL: http://kpi-engine:8082
      AUTH_VALIDATION_URL: http://authservice-1:8080/api/auth/validate
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    mem_limit: 200m
    cpus: 0.15

volumes:
  postgres_data:
  postgres_events_data:
  postgres_kpi_data:
