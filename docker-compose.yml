services:
  postgres-events:
    image: postgres:15
    container_name: dataingestion-postgres
    environment:
      POSTGRES_DB: ${EVENTS_DB_NAME:-events_db}
      POSTGRES_USER: ${EVENTS_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${EVENTS_DB_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - postgres_events_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVENTS_DB_USERNAME:-postgres} -d ${EVENTS_DB_NAME:-events_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-kpi:
    image: postgres:15
    container_name: kpiengine-postgres
    environment:
      POSTGRES_DB: ${KPI_DB_NAME:-kpi_db}
      POSTGRES_USER: ${KPI_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${KPI_DB_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - postgres_kpi_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KPI_DB_USERNAME:-postgres} -d ${KPI_DB_NAME:-kpi_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: authservice-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-authservice_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-authservice_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  authservice-1:
    build:
      context: ./authservice
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-authservice_db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    expose:
      - "8080"
    volumes:
      - ./Logs:/app/Logs

  authservice-2:
    build:
      context: ./authservice
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-authservice_db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    expose:
      - "8080"
    volumes:
      - ./Logs:/app/Logs

  data-ingestion-service-1:
    build:
      context: ./data-ingestion-service
      dockerfile: Dockerfile
    depends_on:
      postgres-events:
        condition: service_healthy
      kpi-engine:
        condition: service_started
    environment:
      EVENTS_DB_URL: jdbc:postgresql://postgres-events:5432/${EVENTS_DB_NAME:-events_db}
      EVENTS_DB_USERNAME: ${EVENTS_DB_USERNAME:-postgres}
      EVENTS_DB_PASSWORD: ${EVENTS_DB_PASSWORD:-postgres}
      KPI_ENGINE_BASE_URL: ${KPI_ENGINE_BASE_URL:-http://kpi-engine:8082}
    ports:
      - "8081:8081"

  data-ingestion-service-2:
    build:
      context: ./data-ingestion-service
      dockerfile: Dockerfile
    depends_on:
      postgres-events:
        condition: service_healthy
      kpi-engine:
        condition: service_started
    environment:
      EVENTS_DB_URL: jdbc:postgresql://postgres-events:5432/${EVENTS_DB_NAME:-events_db}
      EVENTS_DB_USERNAME: ${EVENTS_DB_USERNAME:-postgres}
      EVENTS_DB_PASSWORD: ${EVENTS_DB_PASSWORD:-postgres}
      KPI_ENGINE_BASE_URL: ${KPI_ENGINE_BASE_URL:-http://kpi-engine:8082}
    expose:
      - "8081"

  kpi-engine:
    build:
      context: ./kpi-engine
      dockerfile: Dockerfile
    depends_on:
      postgres-kpi:
        condition: service_healthy
    environment:
      KPI_DB_URL: jdbc:postgresql://postgres-kpi:5432/${KPI_DB_NAME:-kpi_db}
      KPI_DB_USERNAME: ${KPI_DB_USERNAME:-postgres}
      KPI_DB_PASSWORD: ${KPI_DB_PASSWORD:-postgres}
    ports:
      - "8082:8082"
    expose:
      - "8082"

  api-gateway:
    image: nginx:1.27-alpine
    container_name: authservice-api-gateway
    depends_on:
      - authservice-1
      - authservice-2
      - data-ingestion-service-1
      - data-ingestion-service-2
      - kpi-engine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  postgres_events_data:
  postgres_kpi_data:
