spring.datasource.url=jdbc:h2:mem:authservice;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
jwt.secret=local_test_secret_12345678901234567890123456789012
app.bootstrap.admin-token=local_test_bootstrap_token
