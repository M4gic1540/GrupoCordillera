worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    # Rate limit per source IP as first line of defense.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # Basic request signature checks for common malicious patterns.
    map $request_uri $waf_uri_block {
        default 0;
        ~*(\.\./|%2e%2e%2f|<script|%3cscript|/wp-admin|/phpmyadmin) 1;
    }

    map $query_string $waf_query_block {
        default 0;
        ~*(union(\+|\s)+select|select(\+|\s)+.*(\+|\s)+from|drop(\+|\s)+table|insert(\+|\s)+into|or(\+|\s)+1=1) 1;
    }

    map $http_user_agent $waf_ua_block {
        default 0;
        ~*(sqlmap|nikto|nmap|acunetix|masscan|dirbuster) 1;
    }

    upstream auth_backend {
        least_conn;
        server authservice-1:8080 max_fails=3 fail_timeout=10s;
        server authservice-2:8080 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8080;
        server_name _;

        location / {
            if ($waf_uri_block = 1) {
                return 403;
            }

            if ($waf_query_block = 1) {
                return 403;
            }

            if ($waf_ua_block = 1) {
                return 403;
            }

            limit_req zone=api_limit burst=40 nodelay;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;

            proxy_pass http://auth_backend;
        }
    }
}
